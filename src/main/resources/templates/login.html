<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>吾家有宠 - 登录</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel login-panel-with-visual">
        <div class="login-visual">
            <div class="login-visual-copy">
            <p class="eyebrow">吾家有宠</p>
            <h1>记录宠物友好</h1>
            <p>从日常照护到周边探索，把家里的小朋友安排得妥妥帖帖。</p>
            </div>
        </div>
        <form th:action="@{/login}" method="post" class="form-stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                用户名
                <input name="username" type="text" autocomplete="username" required autofocus>
            </label>
            <label>
                密码
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <p class="alert error" th:if="${param.error}">用户名或密码不正确</p>
            <p class="alert success" th:if="${param.logout}">已退出登录</p>
            <p class="alert success" th:if="${param.registered}">注册成功，请登录</p>
            <button class="primary-button" type="submit">登录</button>
            <a class="auth-link" th:href="@{/register}">还没有账号？注册</a>
        </form>
    </section>
</main>
</body>
</html>
