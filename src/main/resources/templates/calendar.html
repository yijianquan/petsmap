<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>吾家有宠 - 日历</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">吾家有宠</a>
    <nav>
        <a th:href="@{/}">宠物</a>
        <a class="active" th:href="@{/calendar}">日历</a>
        <a th:href="@{/places}">地图</a>
        <a th:href="@{/qa}">问答</a>
    </nav>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="ghost-button" type="submit">退出</button>
    </form>
</header>

<main class="page">
    <div class="modal-backdrop hidden" id="eventModal">
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="eventFormTitle">
            <div class="modal-header">
                <h2 id="eventFormTitle">新增记录</h2>
                <button class="modal-close" type="button" data-close-modal="eventModal" aria-label="关闭">×</button>
            </div>
            <form id="eventForm" th:action="@{/calendar/events}" th:object="${event}" method="post" class="form-stack">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    宠物
                    <select id="eventPetId" name="petId" required>
                        <option value="">请选择</option>
                        <option th:each="pet : ${pets}" th:value="${pet.id}" th:text="${pet.nickname}"></option>
                    </select>
                </label>
                <label>
                    类型
                    <select id="eventType" th:field="*{type}">
                        <option th:each="type : ${eventTypes}" th:value="${type}" th:text="${type.displayName}"></option>
                    </select>
                </label>
                <label id="vaccineCategoryField">
                    疫苗类别
                    <input id="eventVaccineCategory" th:field="*{vaccineCategory}" type="text" placeholder="狂犬、猫三联、犬四联...">
                </label>
                <label>
                    日期
                    <input id="eventDate" th:field="*{eventDate}" type="date" required>
                </label>
                <label>
                    备注
                    <textarea id="eventNote" th:field="*{note}" rows="4" placeholder="例如：下次复查、预约医院、护理要点"></textarea>
                </label>
                <div class="action-row split-actions">
                    <button class="ghost-button" id="resetEventFormButton" type="button">新增模式</button>
                    <button class="primary-button" id="saveEventButton" type="submit">保存记录</button>
                </div>
            </form>
            <form id="deleteEventForm" method="post" class="delete-form hidden">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="danger-button" type="submit" onclick="return confirm('确定删除这条日历记录吗？')">删除当前记录</button>
            </form>
        </section>
    </div>

    <section class="calendar-layout calendar-layout-main">
        <div class="calendar-panel">
            <div class="calendar-toolbar">
                <button class="small-action-button" id="openEventModalButton" type="button">+ 新增记录</button>
                <div class="calendar-nav">
                    <button class="ghost-button" id="prevMonthButton" type="button">上月</button>
                    <strong id="calendarTitle"></strong>
                    <button class="ghost-button" id="nextMonthButton" type="button">下月</button>
                </div>
            </div>
            <div class="weekday-grid">
                <span>周一</span>
                <span>周二</span>
                <span>周三</span>
                <span>周四</span>
                <span>周五</span>
                <span>周六</span>
                <span>周日</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="empty" th:if="${#lists.isEmpty(events)}">暂无日历记录。点击日期就能新增第一条。</div>
        </div>

        <aside class="agenda-panel">
            <div class="agenda-section">
                <div class="segmented-tabs" role="tablist" aria-label="事项状态">
                    <button class="segment-button active" id="upcomingTabButton" type="button" data-agenda-tab="upcoming">未来事项</button>
                    <button class="segment-button" id="expiredTabButton" type="button" data-agenda-tab="expired">已过期</button>
                </div>
                <div id="upcomingEvents" class="agenda-list"></div>
                <div id="expiredEvents" class="agenda-list hidden"></div>
            </div>
        </aside>
    </section>
</main>
<script th:inline="javascript">
    const events = /*[[${events}]]*/ [];
    const pets = /*[[${pets}]]*/ [];
    const csrfParameter = /*[[${_csrf.parameterName}]]*/ "_csrf";
    const csrfToken = /*[[${_csrf.token}]]*/ "";
    const calendarGrid = document.getElementById("calendarGrid");
    const upcomingEventsEl = document.getElementById("upcomingEvents");
    const expiredEventsEl = document.getElementById("expiredEvents");
    const calendarTitle = document.getElementById("calendarTitle");
    const eventForm = document.getElementById("eventForm");
    const deleteEventForm = document.getElementById("deleteEventForm");
    const formTitle = document.getElementById("eventFormTitle");
    const saveButton = document.getElementById("saveEventButton");
    const eventModal = document.getElementById("eventModal");
    const petInput = document.getElementById("eventPetId");
    const typeInput = document.getElementById("eventType");
    const vaccineField = document.getElementById("vaccineCategoryField");
    const vaccineInput = document.getElementById("eventVaccineCategory");
    const dateInput = document.getElementById("eventDate");
    const noteInput = document.getElementById("eventNote");
    const today = new Date();
    let visibleYear = today.getFullYear();
    let visibleMonth = today.getMonth();

    document.getElementById("prevMonthButton").addEventListener("click", () => moveMonth(-1));
    document.getElementById("nextMonthButton").addEventListener("click", () => moveMonth(1));
    document.querySelectorAll("[data-agenda-tab]").forEach((button) => {
        button.addEventListener("click", () => switchAgendaTab(button.dataset.agendaTab));
    });
    document.getElementById("openEventModalButton").addEventListener("click", () => {
        resetForm();
        openModal(eventModal);
    });
    document.getElementById("resetEventFormButton").addEventListener("click", () => resetForm());
    document.querySelectorAll("[data-close-modal]").forEach((button) => {
        button.addEventListener("click", () => closeModal(document.getElementById(button.dataset.closeModal)));
    });
    eventModal.addEventListener("click", (event) => {
        if (event.target === eventModal) {
            closeModal(eventModal);
        }
    });
    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !eventModal.classList.contains("hidden")) {
            closeModal(eventModal);
        }
    });
    typeInput.addEventListener("change", () => applyEventTypeHints(true));

    renderCalendar();
    renderAgenda();
    applyEventTypeHints(false);

    function moveMonth(step) {
        const next = new Date(visibleYear, visibleMonth + step, 1);
        visibleYear = next.getFullYear();
        visibleMonth = next.getMonth();
        renderCalendar();
    }

    function renderCalendar() {
        calendarGrid.innerHTML = "";
        calendarTitle.textContent = `${visibleYear}年${visibleMonth + 1}月`;

        const firstDay = new Date(visibleYear, visibleMonth, 1);
        const firstWeekday = (firstDay.getDay() + 6) % 7;
        const daysInMonth = new Date(visibleYear, visibleMonth + 1, 0).getDate();
        const previousMonthDays = new Date(visibleYear, visibleMonth, 0).getDate();
        const totalCells = Math.ceil((firstWeekday + daysInMonth) / 7) * 7;

        for (let index = 0; index < totalCells; index++) {
            const cellOffset = index - firstWeekday + 1;
            const cellDate = new Date(visibleYear, visibleMonth, cellOffset);
            const dateText = toDateText(cellDate);
            const inCurrentMonth = cellDate.getMonth() === visibleMonth;
            const dayEvents = events.filter((item) => item.eventDate === dateText);
            const cell = document.createElement("button");
            cell.className = `calendar-day${inCurrentMonth ? "" : " muted-day"}${dateText === toDateText(today) ? " today" : ""}`;
            cell.type = "button";
            cell.addEventListener("click", () => selectDate(dateText));

            const dayNumber = document.createElement("span");
            dayNumber.className = "day-number";
            dayNumber.textContent = inCurrentMonth ? String(cellDate.getDate()) : String(cellOffset <= 0 ? previousMonthDays + cellOffset : cellDate.getDate());
            cell.appendChild(dayNumber);

            const tagWrap = document.createElement("span");
            tagWrap.className = "event-tags";
            dayEvents.forEach((event) => {
                const tag = document.createElement("span");
                tag.className = `event-tag ${event.type.toLowerCase()}`;
                tag.textContent = eventLabel(event);
                tag.title = event.note || "";
                tag.addEventListener("click", (e) => {
                    e.stopPropagation();
                    editEvent(event);
                });
                tagWrap.appendChild(tag);
            });
            cell.appendChild(tagWrap);
            calendarGrid.appendChild(cell);
        }
    }

    function selectDate(dateText) {
        resetForm(dateText);
        openModal(eventModal);
        dateInput.focus();
    }

    function editEvent(event) {
        formTitle.textContent = "编辑记录";
        saveButton.textContent = "保存修改";
        eventForm.action = `/calendar/events/${event.id}/edit`;
        deleteEventForm.action = `/calendar/events/${event.id}/delete`;
        deleteEventForm.classList.remove("hidden");
        petInput.value = String(event.pet.id);
        typeInput.value = event.type;
        vaccineInput.value = event.vaccineCategory || "";
        dateInput.value = event.eventDate;
        noteInput.value = event.note || "";
        applyEventTypeHints(false);
        openModal(eventModal);
    }

    function resetForm(dateText = "") {
        formTitle.textContent = "新增记录";
        saveButton.textContent = "保存记录";
        eventForm.action = "/calendar/events";
        deleteEventForm.classList.add("hidden");
        petInput.value = pets.length === 1 ? String(pets[0].id) : "";
        typeInput.value = "VACCINE";
        vaccineInput.value = "";
        dateInput.value = dateText;
        noteInput.value = "";
        applyEventTypeHints(true);
    }

    function openModal(modal) {
        modal.classList.remove("hidden");
        document.body.classList.add("modal-open");
    }

    function closeModal(modal) {
        modal.classList.add("hidden");
        document.body.classList.remove("modal-open");
    }

    function eventLabel(event) {
        const petName = event.pet?.nickname || "宠物";
        const typeName = event.type === "VACCINE" ? "疫苗" : event.type === "BATH" ? "洗澡" : "节日";
        const vaccine = event.vaccineCategory ? `/${event.vaccineCategory}` : "";
        return `${petName} ${typeName}${vaccine}`;
    }

    function renderAgenda() {
        const todayText = toDateText(today);
        const sorted = [...events].sort((a, b) => a.eventDate.localeCompare(b.eventDate));
        const upcoming = sorted.filter((event) => event.eventDate >= todayText);
        const expired = sorted.filter((event) => event.eventDate < todayText).reverse();
        renderAgendaList(upcomingEventsEl, upcoming, "暂无未来事项");
        renderAgendaList(expiredEventsEl, expired, "暂无过期事项");
    }

    function switchAgendaTab(tab) {
        const showUpcoming = tab === "upcoming";
        upcomingEventsEl.classList.toggle("hidden", !showUpcoming);
        expiredEventsEl.classList.toggle("hidden", showUpcoming);
        document.querySelectorAll("[data-agenda-tab]").forEach((button) => {
            button.classList.toggle("active", button.dataset.agendaTab === tab);
        });
    }

    function renderAgendaList(container, items, emptyText) {
        container.innerHTML = "";
        if (items.length === 0) {
            const empty = document.createElement("div");
            empty.className = "agenda-empty";
            empty.textContent = emptyText;
            container.appendChild(empty);
            return;
        }
        items.slice(0, 12).forEach((event) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `agenda-item ${event.type.toLowerCase()}`;
            button.innerHTML = `<strong>${escapeHtml(event.eventDate)}</strong><span>${escapeHtml(eventLabel(event))}</span>`;
            button.addEventListener("click", () => editEvent(event));
            container.appendChild(button);
        });
    }

    function applyEventTypeHints(shouldFillDefault) {
        const type = typeInput.value;
        vaccineField.classList.toggle("hidden", type !== "VACCINE");
        if (type !== "VACCINE") {
            vaccineInput.value = "";
        }

        if (type === "VACCINE") {
            vaccineInput.placeholder = "狂犬、猫三联、犬四联、妙三多、驱虫...";
            noteInput.placeholder = "例如：下次复查时间、接种医院、批号、是否有不良反应";
            if (shouldFillDefault && !noteInput.value) {
                noteInput.value = "预约疫苗";
            }
            return;
        }

        if (type === "BATH") {
            noteInput.placeholder = "例如：预约洗澡、剪指甲、清耳朵、护理门店、接送时间";
            if (shouldFillDefault && (!noteInput.value || noteInput.value === "预约疫苗")) {
                noteInput.value = "预约洗澡";
            }
            return;
        }

        noteInput.placeholder = "例如：生日纪念日、第1000日、领养纪念日、到家纪念日、绝育纪念日";
        if (shouldFillDefault && (!noteInput.value || noteInput.value === "预约疫苗" || noteInput.value === "预约洗澡")) {
            noteInput.value = "生日纪念日";
        }
    }

    function toDateText(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
</body>
</html>
