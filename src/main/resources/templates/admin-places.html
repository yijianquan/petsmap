<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>宠趣行 - 地点管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="admin-body">
<header class="admin-topbar">
    <a class="admin-brand" th:href="@{/admin}">宠趣行后台</a>
    <nav class="admin-nav">
        <a th:href="@{/admin}">总览</a>
        <a class="active" th:href="@{/admin/places}">地点管理</a>
        <a th:href="@{/admin/walk-groups}">群聊管理</a><a th:href="@{/admin/dictionaries}">字典管理</a>
        <a th:href="@{/admin/areas}">城市管理</a>
        <a th:href="@{/admin/users}">微信用户</a>
    </nav>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="admin-logout" type="submit">退出</button>
    </form>
</header>

<main class="admin-page">
    <section class="admin-card">
        <form class="admin-toolbar" th:action="@{/admin/places}" method="get">
            <div class="admin-toolbar-left">
                <label class="compact-filter place-name-filter">
                    地点名
                    <input name="name" th:value="${name}" placeholder="输入地点名筛选">
                </label>
                <label class="compact-filter place-city-filter">
                    城市
                    <span class="area-combo js-area-combo" data-placeholder="选择城市">
                        <button class="area-combo-trigger" type="button"
                                th:text="${#strings.isEmpty(cityCode) ? '选择城市' : (cityNameByCode.get(cityCode) ?: '选择城市')}">选择城市</button>
                        <input type="hidden" name="cityCode" th:value="${cityCode}">
                        <span class="area-combo-menu hidden">
                            <span class="area-combo-provinces">
                                <button class="area-combo-province"
                                        type="button"
                                        th:each="province : ${provinceAreas}"
                                        th:attr="data-province-id=${province.adcode},data-province-name=${province.name}"
                                        th:text="${province.name}">省份</button>
                            </span>
                            <span class="area-combo-cities">
                                <button class="area-combo-city"
                                        type="button"
                                        th:each="city : ${cityAreas}"
                                        th:attr="data-city-code=${city.cityCode},data-city-name=${city.name},data-province-id=${city.pid}"
                                        th:text="${city.name}">城市</button>
                            </span>
                        </span>
                    </span>
                </label>
                <label class="compact-filter">
                    类型
                    <select name="type">
                        <option value="">全部类型</option>
                        <option th:each="placeType : ${placeTypes}"
                                th:value="${placeType}"
                                th:selected="${type == placeType.name()}"
                                th:text="${placeType.displayName}">类型</option>
                    </select>
                </label>
                <button class="admin-primary" type="submit">查询</button>
                <a class="admin-secondary-link" th:href="@{/admin/places}">重置</a>
                <span th:text="${placePage.totalElements + ' 条结果'}">0 条结果</span>
            </div>
            <button class="admin-primary" type="button" data-open-modal="placeCreateModal">新增地点</button>
        </form>
    </section>

    <section class="admin-card">
        <p class="admin-error" th:if="${errorMessage}" th:text="${errorMessage}">错误</p>
        <div class="admin-empty" th:if="${#lists.isEmpty(places)}">暂无地点数据。</div>
        <div class="admin-table-wrap" th:if="${!#lists.isEmpty(places)}">
            <table class="admin-table">
                <thead>
                <tr>
                    <th class="col-name">地点</th>
                    <th class="col-type">类型</th>
                    <th class="col-city">城市</th>
                    <th class="col-address">地址</th>
                    <th class="col-rating">评分</th>
                    <th class="col-uploader">上传者</th>
                    <th class="col-actions">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${places}"
                    th:with="placeComments=${commentsByPlaceId[item.id]}">
                    <td class="ellipsis-cell">
                        <strong th:text="${item.name}">地点</strong>
                        <span th:text="${item.tags}">标签</span>
                    </td>
                    <td class="ellipsis-cell" th:text="${item.type.displayName}">类型</td>
                    <td class="ellipsis-cell" th:text="${#strings.isEmpty(item.cityCode) ? '-' : (cityNameByCode.get(item.cityCode) ?: '-')}">城市</td>
                    <td class="ellipsis-cell">
                        <span th:text="${item.address}">地址</span>
                        <span th:if="${!#strings.isEmpty(item.phone)}" th:text="${'电话：' + item.phone}">电话</span>
                    </td>
                    <td class="ellipsis-cell" th:text="${item.ratingText}">评分</td>
                    <td class="ellipsis-cell" th:text="${item.uploadedBy == null ? '-' : item.uploadedBy.username}">上传者</td>
                    <td class="action-cell">
                        <div class="admin-row-actions">
                            <button class="admin-secondary" type="button" th:attr="data-open-modal='placeEditModal-' + ${item.id}">编辑</button>
                            <button class="admin-secondary" type="button" th:attr="data-open-modal='commentModal-' + ${item.id}">查看评论</button>
                            <form th:action="@{/admin/places/{id}/delete(id=${item.id})}" method="post" onsubmit="return confirm('确定删除这个地点及其评论吗？')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="admin-danger" type="submit">删除</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="admin-pagination" th:if="${totalPages > 1}">
            <a class="admin-secondary-link"
               th:classappend="${currentPage == 0} ? ' disabled'"
               th:href="@{/admin/places(name=${name},cityCode=${cityCode},type=${type},page=${currentPage - 1})}">上一页</a>
            <span th:text="${currentPage + 1 + ' / ' + totalPages}">1 / 1</span>
            <a class="admin-secondary-link"
               th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
               th:href="@{/admin/places(name=${name},cityCode=${cityCode},type=${type},page=${currentPage + 1})}">下一页</a>
        </div>
    </section>
</main>

<div class="admin-modal-backdrop hidden" id="placeCreateModal">
    <section class="admin-modal">
        <div class="admin-modal-head">
            <h2>新增地点</h2>
            <button type="button" data-close-modal="placeCreateModal">×</button>
        </div>
        <form class="admin-form-grid" th:action="@{/admin/places}" th:object="${place}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>名称<input th:field="*{name}" required placeholder="例如：某某宠物友好餐厅"></label>
            <label>类型
                <select th:field="*{type}">
                    <option th:each="type : ${placeTypes}" th:value="${type}" th:text="${type.displayName}"></option>
                </select>
            </label>
            <label>城市
                <span class="area-combo js-area-combo" data-placeholder="选择城市">
                    <button class="area-combo-trigger" type="button">选择城市</button>
                    <input type="hidden" name="cityCode" value="">
                    <span class="area-combo-menu hidden">
                        <span class="area-combo-provinces">
                            <button class="area-combo-province"
                                    type="button"
                                    th:each="province : ${provinceAreas}"
                                    th:attr="data-province-id=${province.adcode},data-province-name=${province.name}"
                                    th:text="${province.name}">省份</button>
                        </span>
                        <span class="area-combo-cities">
                            <button class="area-combo-city"
                                    type="button"
                                    th:each="city : ${cityAreas}"
                                    th:attr="data-city-code=${city.cityCode},data-city-name=${city.name},data-province-id=${city.pid}"
                                    th:text="${city.name}">城市</button>
                        </span>
                    </span>
                </span>
            </label>
            <label class="wide">地址<input th:field="*{address}" placeholder="城市、街道、门牌"></label>
            <label class="wide">联系电话<input th:field="*{phone}" placeholder="固话或手机号"></label>
            <label>纬度<input th:field="*{latitude}" inputmode="decimal"></label>
            <label>经度<input th:field="*{longitude}" inputmode="decimal"></label>
            <div class="admin-tag-groups wide">
                <div class="admin-tag-group" th:each="group : ${tagGroups}">
                    <strong th:text="${group.name()}">分组</strong>
                    <div class="admin-tag-options">
                        <label class="admin-tag-option" th:each="tag : ${group.tags()}">
                            <input name="tagValues" type="checkbox" th:value="${tag}">
                            <span th:text="${tag}">标签</span>
                        </label>
                    </div>
                </div>
            </div>
            <label class="wide">说明<textarea th:field="*{description}" rows="3"></textarea></label>
            <button class="admin-primary wide" type="submit">保存</button>
        </form>
    </section>
</div>

<th:block th:each="item : ${places}" th:with="placeComments=${commentsByPlaceId[item.id]}">
    <div class="admin-modal-backdrop hidden" th:id="${'placeEditModal-' + item.id}">
        <section class="admin-modal">
            <div class="admin-modal-head">
                <h2 th:text="${'编辑：' + item.name}">编辑地点</h2>
                <button type="button" th:attr="data-close-modal='placeEditModal-' + ${item.id}">×</button>
            </div>
            <form class="admin-form-grid" th:action="@{/admin/places/{id}/edit(id=${item.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>名称<input name="name" th:value="${item.name}" required></label>
                <label>类型
                    <select name="type">
                        <option th:each="type : ${placeTypes}" th:value="${type}" th:selected="${type == item.type.categoryType()}" th:text="${type.displayName}"></option>
                    </select>
                </label>
                <label>城市
                    <span class="area-combo js-area-combo" data-placeholder="选择城市">
                        <button class="area-combo-trigger" type="button"
                                th:text="${#strings.isEmpty(item.cityCode) ? '选择城市' : (cityNameByCode.get(item.cityCode) ?: '选择城市')}">选择城市</button>
                        <input type="hidden" name="cityCode" th:value="${item.cityCode}">
                        <span class="area-combo-menu hidden">
                            <span class="area-combo-provinces">
                                <button class="area-combo-province"
                                        type="button"
                                        th:each="province : ${provinceAreas}"
                                        th:attr="data-province-id=${province.adcode},data-province-name=${province.name}"
                                        th:text="${province.name}">省份</button>
                            </span>
                            <span class="area-combo-cities">
                                <button class="area-combo-city"
                                        type="button"
                                        th:each="city : ${cityAreas}"
                                        th:attr="data-city-code=${city.cityCode},data-city-name=${city.name},data-province-id=${city.pid}"
                                        th:text="${city.name}">城市</button>
                            </span>
                        </span>
                    </span>
                </label>
                <label class="wide">地址<input name="address" th:value="${item.address}"></label>
                <label class="wide">联系电话<input name="phone" th:value="${item.phone}"></label>
                <label>纬度<input name="latitude" th:value="${item.latitude}" inputmode="decimal"></label>
                <label>经度<input name="longitude" th:value="${item.longitude}" inputmode="decimal"></label>
                <div class="admin-tag-groups wide">
                    <div class="admin-tag-group" th:each="group : ${tagGroups}">
                        <strong th:text="${group.name()}">分组</strong>
                        <div class="admin-tag-options">
                            <label class="admin-tag-option" th:each="tag : ${group.tags()}">
                                <input name="tagValues" type="checkbox" th:value="${tag}" th:checked="${item.tagList.contains(tag)}">
                                <span th:text="${tag}">标签</span>
                            </label>
                        </div>
                    </div>
                </div>
                <label class="wide">说明<textarea name="description" rows="3" th:text="${item.description}"></textarea></label>
                <button class="admin-primary wide" type="submit">保存修改</button>
            </form>
        </section>
    </div>

    <div class="admin-modal-backdrop hidden" th:id="${'commentModal-' + item.id}">
        <section class="admin-modal wide-modal">
            <div class="admin-modal-head">
                <h2 th:text="${'评论：' + item.name}">查看评论</h2>
                <button type="button" th:attr="data-close-modal='commentModal-' + ${item.id}">×</button>
            </div>
            <div class="admin-empty" th:if="${#lists.isEmpty(placeComments)}">暂无评论。</div>
            <div class="admin-comment-list" th:if="${!#lists.isEmpty(placeComments)}">
                <article class="admin-comment-row" th:each="comment : ${placeComments}">
                    <form th:action="@{/admin/comments/{id}/edit(id=${comment.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="returnName" th:value="${name}">
                        <input type="hidden" name="returnCityCode" th:value="${cityCode}">
                        <input type="hidden" name="returnType" th:value="${type}">
                        <input type="hidden" name="returnPage" th:value="${currentPage}">
                        <div class="admin-comment-meta">
                            <strong th:text="${comment.user == null ? '未知用户' : comment.user.username}">用户</strong>
                            <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">时间</span>
                        </div>
                        <select name="rating">
                            <option th:each="score : ${#numbers.sequence(5,1)}" th:value="${score}" th:selected="${score == comment.rating}" th:text="${score + '分'}">5分</option>
                        </select>
                        <textarea name="content" rows="3" th:text="${comment.content}" required></textarea>
                        <button class="admin-secondary" type="submit">保存评论</button>
                    </form>
                    <form th:action="@{/admin/comments/{id}/delete(id=${comment.id})}" method="post" onsubmit="return confirm('确定删除这条评论吗？')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="returnName" th:value="${name}">
                        <input type="hidden" name="returnCityCode" th:value="${cityCode}">
                        <input type="hidden" name="returnType" th:value="${type}">
                        <input type="hidden" name="returnPage" th:value="${currentPage}">
                        <button class="admin-danger" type="submit">删除评论</button>
                    </form>
                </article>
            </div>
            <form class="admin-comment-create" th:action="@{/admin/places/{id}/comments(id=${item.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="returnName" th:value="${name}">
                <input type="hidden" name="returnCityCode" th:value="${cityCode}">
                <input type="hidden" name="returnType" th:value="${type}">
                <input type="hidden" name="returnPage" th:value="${currentPage}">
                <h3>新增后台评论</h3>
                <select name="rating">
                    <option value="5">5分</option>
                    <option value="4">4分</option>
                    <option value="3">3分</option>
                    <option value="2">2分</option>
                    <option value="1">1分</option>
                </select>
                <textarea name="content" rows="3" placeholder="填写评论内容" required></textarea>
                <button class="admin-primary" type="submit">新增评论</button>
            </form>
        </section>
    </div>
</th:block>

<script th:inline="javascript">
    const commentPlaceId = /*[[${commentPlaceId}]]*/ "";

    document.querySelectorAll("[data-open-modal]").forEach((button) => {
        button.addEventListener("click", () => {
            document.getElementById(button.dataset.openModal)?.classList.remove("hidden");
        });
    });
    document.querySelectorAll("[data-close-modal]").forEach((button) => {
        button.addEventListener("click", () => {
            document.getElementById(button.dataset.closeModal)?.classList.add("hidden");
        });
    });
    document.querySelectorAll(".admin-modal-backdrop").forEach((backdrop) => {
        backdrop.addEventListener("click", (event) => {
            if (event.target === backdrop) backdrop.classList.add("hidden");
        });
    });
    setupAreaCombos();
    if (commentPlaceId) {
        document.getElementById(`commentModal-${commentPlaceId}`)?.classList.remove("hidden");
    }

    function setupAreaCombos() {
        const closeAll = (except) => {
            document.querySelectorAll(".area-combo-menu").forEach((menu) => {
                if (menu !== except) menu.classList.add("hidden");
            });
        };
        document.querySelectorAll(".js-area-combo").forEach((combo) => {
            const trigger = combo.querySelector(".area-combo-trigger");
            const input = combo.querySelector("input[type='hidden']");
            const menu = combo.querySelector(".area-combo-menu");
            const provinces = Array.from(combo.querySelectorAll(".area-combo-province"));
            const cities = Array.from(combo.querySelectorAll(".area-combo-city"));
            const placeholder = combo.dataset.placeholder || "选择城市";

            const setProvince = (provinceId) => {
                provinces.forEach((province) => {
                    province.classList.toggle("active", province.dataset.provinceId === provinceId);
                });
                cities.forEach((city) => {
                    city.hidden = city.dataset.provinceId !== provinceId;
                });
                const selected = cities.find((city) => city.classList.contains("selected"));
                if (selected && selected.hidden) {
                    selected.classList.remove("selected");
                    input.value = "";
                    trigger.textContent = placeholder;
                }
            };

            const selectCity = (city) => {
                cities.forEach((item) => item.classList.toggle("selected", item === city));
                input.value = city?.dataset.cityCode || "";
                trigger.textContent = city ? cityLabel(city) : placeholder;
                menu.classList.add("hidden");
            };

            const cityLabel = (city) => {
                const province = provinces.find((item) => item.dataset.provinceId === city.dataset.provinceId);
                const provinceName = province?.dataset.provinceName || "";
                return provinceName ? `${provinceName} - ${city.dataset.cityName}` : city.dataset.cityName;
            };

            const selected = cities.find((city) => input.value && city.dataset.cityCode === input.value);
            const firstProvinceId = selected?.dataset.provinceId || provinces[0]?.dataset.provinceId || "";
            setProvince(firstProvinceId);
            if (selected) {
                selected.classList.add("selected");
                trigger.textContent = cityLabel(selected) || placeholder;
            }

            trigger.addEventListener("click", (event) => {
                event.stopPropagation();
                const willOpen = menu.classList.contains("hidden");
                closeAll(menu);
                menu.classList.toggle("hidden", !willOpen);
            });
            menu.addEventListener("click", (event) => event.stopPropagation());
            provinces.forEach((province) => {
                province.addEventListener("click", () => setProvince(province.dataset.provinceId || ""));
            });
            cities.forEach((city) => {
                city.addEventListener("click", () => selectCity(city));
            });
        });
        document.addEventListener("click", () => closeAll());
    }
</script>
</body>
</html>
