<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>吾家有宠 - 首页</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">吾家有宠</a>
    <nav>
        <a class="active" th:href="@{/}">宠物</a>
        <a th:href="@{/calendar}">日历</a>
        <a th:href="@{/places}">地图</a>
        <a th:href="@{/qa}">问答</a>
    </nav>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="ghost-button" type="submit">退出</button>
    </form>
</header>

<main class="page">
    <section class="page-heading compact-heading">
        <button class="small-action-button" id="openPetModalButton" type="button">+ 新增宠物</button>
    </section>

    <section class="single-column">
        <div class="modal-backdrop hidden" id="petModal">
            <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="petModalTitle">
                <div class="modal-header">
                    <h2 id="petModalTitle">新增宠物</h2>
                    <button class="modal-close" type="button" data-close-modal="petModal" aria-label="关闭">×</button>
                </div>
            <form th:action="@{/pets}" th:object="${pet}" method="post" enctype="multipart/form-data" class="form-stack">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    昵称
                    <input th:field="*{nickname}" type="text" placeholder="例如：奶糖" required>
                </label>
                <label>
                    类别
                    <select th:field="*{category}">
                        <option th:each="category : ${categories}" th:value="${category}" th:text="${category.displayName}"></option>
                    </select>
                </label>
                <label>
                    头像图片
                    <input name="avatarFile" type="file" accept="image/*">
                </label>
                <label>
                    性别
                    <select th:field="*{gender}">
                        <option th:each="gender : ${genders}" th:value="${gender}" th:text="${gender.displayName}"></option>
                    </select>
                </label>
                <label>
                    生日
                    <input th:field="*{birthday}" type="date" required>
                </label>
                <button class="primary-button" type="submit">保存宠物</button>
            </form>
            </section>
        </div>

        <div class="pet-list">
            <article class="pet-card" th:each="item : ${pets}">
                <div class="pet-summary">
                    <img th:if="${item.hasAvatarData()}" th:src="@{/pets/{id}/avatar(id=${item.id})}" alt="">
                    <img th:if="${!item.hasAvatarData() and item.avatarUrl != null and !item.avatarUrl.isBlank()}" th:src="${item.avatarUrl}" alt="">
                    <div class="avatar-fallback" th:unless="${item.hasAvatarData() or (item.avatarUrl != null and !item.avatarUrl.isBlank())}">宠</div>
                    <div>
                        <h2 th:text="${item.nickname}">奶糖</h2>
                        <div class="pet-meta-row">
                            <span th:text="${item.category.displayName}">狗狗</span>
                            <span th:classappend="${item.gender.name() == 'MALE'} ? ' gender-male' : (${item.gender.name() == 'FEMALE'} ? ' gender-female' : '')"
                                  th:text="${item.gender.displayName}">女孩</span>
                            <span class="muted">年龄 <span th:text="${item.ageText}">2岁3个月</span></span>
                            <span class="muted">生日 <span th:text="${item.birthday}">2024-01-01</span></span>
                        </div>
                    </div>
                </div>
                <details class="edit-box">
                    <summary>编辑资料</summary>
                    <form th:action="@{/pets/{id}/edit(id=${item.id})}" method="post" enctype="multipart/form-data" class="form-stack compact-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <label>
                            昵称
                            <input name="nickname" type="text" th:value="${item.nickname}" required>
                        </label>
                        <label>
                            类别
                            <select name="category">
                                <option th:each="category : ${categories}"
                                        th:value="${category}"
                                        th:selected="${category == item.category}"
                                        th:text="${category.displayName}"></option>
                            </select>
                        </label>
                        <label>
                            更换头像图片
                            <input name="avatarFile" type="file" accept="image/*">
                        </label>
                        <div class="two-cols">
                            <label>
                                性别
                                <select name="gender">
                                    <option th:each="gender : ${genders}"
                                            th:value="${gender}"
                                            th:selected="${gender == item.gender}"
                                            th:text="${gender.displayName}"></option>
                                </select>
                            </label>
                            <label>
                                生日
                                <input name="birthday" type="date" th:value="${item.birthday}" required>
                            </label>
                        </div>
                        <div class="action-row">
                            <button class="primary-button" type="submit">保存修改</button>
                        </div>
                    </form>
                    <form th:action="@{/pets/{id}/delete(id=${item.id})}" method="post" class="delete-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="danger-button" type="submit" onclick="return confirm('删除后该宠物的日历记录也会一起删除，确定吗？')">删除宠物</button>
                    </form>
                </details>
            </article>
            <div class="empty" th:if="${#lists.isEmpty(pets)}">还没有宠物档案，先添加第一只吧。</div>
        </div>
    </section>
</main>
<script>
    const petModal = document.getElementById("petModal");
    document.getElementById("openPetModalButton").addEventListener("click", () => openModal(petModal));

    document.querySelectorAll("[data-close-modal]").forEach((button) => {
        button.addEventListener("click", () => closeModal(document.getElementById(button.dataset.closeModal)));
    });

    petModal.addEventListener("click", (event) => {
        if (event.target === petModal) {
            closeModal(petModal);
        }
    });

    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !petModal.classList.contains("hidden")) {
            closeModal(petModal);
        }
    });

    function openModal(modal) {
        modal.classList.remove("hidden");
        document.body.classList.add("modal-open");
        const firstInput = modal.querySelector("input:not([type='hidden']), select, textarea, button");
        if (firstInput) {
            firstInput.focus();
        }
    }

    function closeModal(modal) {
        modal.classList.add("hidden");
        document.body.classList.remove("modal-open");
    }
</script>
</body>
</html>
