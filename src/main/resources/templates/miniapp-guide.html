<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>宠趣行 - 小程序开发模式</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f1ea;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .mini-guide {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px;
            box-sizing: border-box;
        }
        .mini-guide-panel {
            width: min(760px, 100%);
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 22px;
            padding: 34px;
            box-shadow: 0 24px 70px rgba(20, 20, 20, 0.10);
        }
        .mini-guide-panel h1 {
            margin: 10px 0 12px;
            font-size: clamp(32px, 6vw, 56px);
            line-height: 1.04;
            letter-spacing: 0;
        }
        .mini-guide-panel p {
            margin: 0 0 18px;
            color: #70685f;
            line-height: 1.7;
        }
        .mini-guide-panel code {
            display: block;
            margin: 10px 0 18px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #f1eee8;
            color: #111111;
            white-space: pre-wrap;
        }
        .guide-eyebrow {
            color: #8a8177;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<main class="mini-guide">
    <section class="mini-guide-panel">
        <div class="guide-eyebrow">Mini Program Mode</div>
        <h1>网页端已退到幕后</h1>
        <p>现在主体验是微信小程序。浏览器里的旧登录/注册页面已经关闭，请用微信开发者工具打开小程序目录查看新效果。</p>
        <code>D:\project\wu-jia-you-chong\miniprogram</code>
        <p>后端仍然启动 <strong>WuJiaYouChongApplication</strong>，小程序默认请求 <strong>http://localhost:8080</strong>。在微信开发者工具里勾选“不校验合法域名、TLS版本以及 HTTPS 证书”。</p>
    </section>
</main>
</body>
</html>
