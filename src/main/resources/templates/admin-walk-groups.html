<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>宠趣行 - 群聊管理</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body class="admin-body">
<header class="admin-topbar">
  <a class="admin-brand" th:href="@{/admin}">宠趣行后台</a>
  <nav class="admin-nav"><a th:href="@{/admin}">总览</a><a th:href="@{/admin/places}">地点管理</a><a class="active" th:href="@{/admin/walk-groups}">群聊管理</a><a th:href="@{/admin/areas}">城市管理</a><a th:href="@{/admin/users}">微信用户</a></nav>
  <form th:action="@{/logout}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="admin-logout" type="submit">退出</button></form>
</header>
<main class="admin-page">
  <section class="admin-card">
    <form class="admin-toolbar" th:action="@{/admin/walk-groups}" method="get">
      <div class="admin-toolbar-left">
        <label class="compact-filter">城市<select name="cityCode"><option value="">全部城市</option><option th:each="city : ${cityAreas}" th:value="${city.cityCode}" th:selected="${city.cityCode == cityCode}" th:text="${city.name}">城市</option></select></label>
        <label class="compact-filter">群聊名<input name="groupName" th:value="${groupName}" placeholder="模糊搜索群聊名"></label>
        <label class="compact-filter">地点名<input name="placeName" th:value="${placeName}" placeholder="模糊搜索地点名"></label>
        <button class="admin-primary" type="submit">查询</button>
      </div>
    </form>
    <div class="admin-empty" th:if="${#lists.isEmpty(groups.content)}">暂无符合条件的群聊。</div>
    <div class="admin-table-wrap" th:if="${!#lists.isEmpty(groups.content)}"><table class="admin-table"><thead><tr><th>群聊名</th><th>绑定地点</th><th>城市</th><th>群主</th><th>人数</th><th>操作</th></tr></thead><tbody>
      <tr th:each="item : ${groups.content}"><td th:text="${item.name}">群聊</td><td th:text="${item.place.name}">地点</td><td th:text="${cityNameByCode.get(item.cityCode) ?: item.cityCode}">城市</td><td th:text="${#strings.isEmpty(item.owner.nickname) ? item.owner.username : item.owner.nickname}">群主</td><td th:text="${memberCounts.get(item.id)}">0</td><td><form th:action="@{/admin/walk-groups/{id}/delete(id=${item.id})}" method="post" onsubmit="return confirm('确定解散该群聊并删除历史消息吗？')"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="admin-danger" type="submit">解散</button></form></td></tr>
    </tbody></table></div>
  </section>
</main>
</body></html>
